services:
  postgres:
    image: postgres:16-alpine
    container_name: solaroo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: solaroo
      POSTGRES_PASSWORD: solaroo_dev
      POSTGRES_DB: solaroo_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solaroo -d solaroo_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: solaroo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
